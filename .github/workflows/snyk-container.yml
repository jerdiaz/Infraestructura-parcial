# Workflow: Dockerfile vulnerability scanning with Snyk + CodeQL SARIF upload
# Triggers on push/PR to main, and weekly on Wednesdays

name: Snyk Container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '18 9 * * 3'

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t snyk-demo/app:latest .

      - name: Run Snyk container scan
        # continue-on-error allows SARIF upload even when vulnerabilities are found
        continue-on-error: true
        uses: snyk/actions/docker@14818c4695ecc4045f33c9cee9e795a788711ca4
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: snyk-demo/app:latest
          args: --file=Dockerfile --severity-threshold=high

      - name: Upload SARIF results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
